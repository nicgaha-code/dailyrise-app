plugins {
    id 'com.android.application'
}

android {
    namespace "com.dailyrise.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.dailyrise.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            storeFile file("../dailyrise-release.keystore")
            storePassword "DailyRise@2026"
            keyAlias "dailyrise-key"
            keyPassword "DailyRise@2026"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
