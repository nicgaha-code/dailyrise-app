workflows:
  android-release:
    name: Android Release Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      android_signing:
        - dailyrise_keystore
      vars:
        PACKAGE_NAME: "com.dailyrise.app"
        GRADLE_OPTS: "-Xmx3072m"
    scripts:
      - name: Install dependencies
        script: |
          cd android
          ./gradlew clean
      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
    publishing:
      email:
        recipients:
          - dailyrise.app@gmail.com
        notify:
          success: true
          failure: true
