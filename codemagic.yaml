workflows:
  android-release:
    name: Android Release Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      vars:
        PACKAGE_NAME: "com.dailyrise.app"
        GRADLE_OPTS: "-Xmx3072m"
    scripts:
      - name: Set up keystore
        script: |
          cd android
          # Copy keystore from repo root
          cp ../dailyrise-release.keystore app/
      - name: Install dependencies
        script: |
          cd android
          ./gradlew clean
      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/dailyrise-release.keystore \
            -Pandroid.injected.signing.store.password=DailyRise@2026 \
            -Pandroid.injected.signing.key.alias=dailyrise-key \
            -Pandroid.injected.signing.key.password=DailyRise@2026 \
            --stacktrace
    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
    publishing:
      email:
        recipients:
          - nicgaha@gmail.com
        notify:
          success: true
          failure: true
